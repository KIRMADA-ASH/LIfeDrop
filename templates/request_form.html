{% extends 'base.html' %}
{% block content %}

<div class="card p-4 bg-dark shadow">
    <h3 class="text-center mb-3">Request Blood 🩸</h3>

    <form method="POST">
        {% csrf_token %}

        <select class="form-control mb-3" name="blood_group">
            <option>A+</option><option>B+</option><option>O+</option>
        </select>

        <input class="form-control mb-3" type="number" name="units" placeholder="Units">

        <input class="form-control mb-3" type="text" name="city" placeholder="City">

        <button class="btn btn-danger w-100">Submit Request</button>
    </form>
</div>

{% endblock %}
