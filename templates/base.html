<!DOCTYPE html>
<html>
<head>
    <title>LifeDrop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0b0b0c;
            color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }
        .navbar { background: rgba(20,20,20,0.7); backdrop-filter: blur(10px); }
        .card { border-radius: 20px; background:#1c1c1e; border:none; }
        .btn { border-radius: 30px; }
        .hero-img { width: 100%; max-height: 400px; object-fit: cover; border-radius:20px; }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">LifeDrop</a>

        <div>
            <a href="/inventory/" class="btn btn-light btn-sm me-2">Inventory</a>
            <a href="/request/" class="btn btn-danger btn-sm me-2">Request</a>
            <a href="/status/" class="btn btn-info btn-sm me-2">Status</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
